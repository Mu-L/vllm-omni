steps:
  - label: "Build and upload wheel"
    key: "build-wheel"
    agents:
      queue: cpu_queue_release
    commands:
      - "curl -LsSf https://astral.sh/uv/install.sh | sh"
      - 'export PATH="$HOME/.local/bin:$PATH"'
      - "uv venv --python=3.12 && source .venv/bin/activate"
      - "uv pip install --upgrade build"
      - "python3 -m build"
      - "bash .buildkite/scripts/upload-nightly-wheels.sh"

  - label: "Generate and upload wheel indices"
    depends_on: "build-wheel"
    allow_dependency_failure: true
    agents:
      queue: small_cpu_queue_release
    commands:
      - "bash .buildkite/scripts/generate-and-upload-nightly-index.sh"

  - group: "Build release Docker images"
    key: "build-release-images"
    steps:
      - label: "Build release image - x86_64"
        key: build-release-image-x86
        depends_on: ~
        agents:
          queue: cpu_queue_release
        commands:
          - "aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws/q9t5s3a7"
          - |
            DOCKER_BUILDKIT=1 docker build \
              --build-arg max_jobs=16 \
              --tag public.ecr.aws/q9t5s3a7/vllm-omni-release-repo:$BUILDKITE_COMMIT-$(uname -m) \
              --tag vllm/vllm-omni:$BUILDKITE_COMMIT-$(uname -m) \
              --tag vllm/vllm-omni:nightly-$(uname -m) \
              --progress plain \
              -f docker/Dockerfile.cuda .
          # push to ECR (per-arch, commit-pinned) for staging
          - "docker push public.ecr.aws/q9t5s3a7/vllm-omni-release-repo:$BUILDKITE_COMMIT-$(uname -m)"
          # push to DockerHub (per-arch) so the multi-arch manifest can reference them
          - "docker push vllm/vllm-omni:$BUILDKITE_COMMIT-$(uname -m)"
          - "docker push vllm/vllm-omni:nightly-$(uname -m)"
        plugins:
          - docker-login#v3.0.0:
              username: vllmbot
              password-env: DOCKERHUB_TOKEN
        env:
          DOCKER_BUILDKIT: "1"
          DOCKERHUB_USERNAME: "vllmbot"

      - label: "Build release image - aarch64"
        key: build-release-image-arm64
        depends_on: ~
        agents:
          queue: arm64_cpu_queue_release
        commands:
          - "aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws/q9t5s3a7"
          - |
            DOCKER_BUILDKIT=1 docker build \
              --build-arg max_jobs=16 \
              --tag public.ecr.aws/q9t5s3a7/vllm-omni-release-repo:$BUILDKITE_COMMIT-$(uname -m) \
              --tag vllm/vllm-omni:$BUILDKITE_COMMIT-$(uname -m) \
              --tag vllm/vllm-omni:nightly-$(uname -m) \
              --progress plain \
              -f docker/Dockerfile.cuda .
          # push to ECR (per-arch, commit-pinned) for staging
          - "docker push public.ecr.aws/q9t5s3a7/vllm-omni-release-repo:$BUILDKITE_COMMIT-$(uname -m)"
          # push to DockerHub (per-arch) so the multi-arch manifest can reference them
          - "docker push vllm/vllm-omni:$BUILDKITE_COMMIT-$(uname -m)"
          - "docker push vllm/vllm-omni:nightly-$(uname -m)"
        plugins:
          - docker-login#v3.0.0:
              username: vllmbot
              password-env: DOCKERHUB_TOKEN
        env:
          DOCKER_BUILDKIT: "1"
          DOCKERHUB_USERNAME: "vllmbot"

  - label: "Publish multi-arch manifest to DockerHub"
    key: publish-multi-arch-dockerhub
    depends_on:
      - build-release-image-x86
      - build-release-image-arm64
    agents:
      queue: small_cpu_queue_release
    commands:
      # ECR multi-arch manifest (commit-pinned, useful for downstream tests)
      - "aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws/q9t5s3a7"
      - "docker manifest create public.ecr.aws/q9t5s3a7/vllm-omni-release-repo:$BUILDKITE_COMMIT public.ecr.aws/q9t5s3a7/vllm-omni-release-repo:$BUILDKITE_COMMIT-x86_64 public.ecr.aws/q9t5s3a7/vllm-omni-release-repo:$BUILDKITE_COMMIT-aarch64 --amend"
      - "docker manifest push public.ecr.aws/q9t5s3a7/vllm-omni-release-repo:$BUILDKITE_COMMIT"
      # DockerHub multi-arch manifests (nightly + commit-pinned)
      - "docker manifest create vllm/vllm-omni:nightly vllm/vllm-omni:nightly-x86_64 vllm/vllm-omni:nightly-aarch64 --amend"
      - "docker manifest create vllm/vllm-omni:nightly-$BUILDKITE_COMMIT vllm/vllm-omni:nightly-x86_64 vllm/vllm-omni:nightly-aarch64 --amend"
      - "docker manifest push vllm/vllm-omni:nightly"
      - "docker manifest push vllm/vllm-omni:nightly-$BUILDKITE_COMMIT"
    plugins:
      - docker-login#v3.0.0:
          username: vllmbot
          password-env: DOCKERHUB_TOKEN
    env:
      DOCKER_BUILDKIT: "1"
      DOCKERHUB_USERNAME: "vllmbot"
